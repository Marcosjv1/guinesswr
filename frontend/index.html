<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guinness World Records</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#">Guinness WR</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="#records">Récords</a></li>
            <li class="nav-item"><a class="nav-link" href="#nuevo">Nuevo Récord</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <header class="hero-section text-white text-center d-flex align-items-center">
      <div class="container">
        <h1 class="display-5 fw-bold">Guinness World Records</h1>
        <p class="lead">Descubre y registra logros extraordinarios en tiempo real</p>
        <span id="backendStatus" class="badge status-badge">Verificando conexión...</span>
      </div>
    </header>

    <main class="container my-5">
      <section id="records" class="mb-5">
        <h2 class="mb-4">Galería de Récords</h2>
        <div id="recordsContainer" class="row g-4"></div>
      </section>

      <section id="nuevo" class="card shadow-sm p-4">
        <h2 class="mb-3">Registrar nuevo récord</h2>
        <form id="recordForm" class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Título</label>
            <input type="text" id="titulo" class="form-control" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Poseedor</label>
            <input type="text" id="poseedor" class="form-control" required />
          </div>
          <div class="col-12">
            <label class="form-label">Descripción</label>
            <textarea id="descripcion" class="form-control" rows="3" required></textarea>
          </div>
          <div class="col-md-4">
            <label class="form-label">Año</label>
            <input type="number" id="anio" class="form-control" required />
          </div>
          <div class="col-md-8">
            <label class="form-label">URL de imagen</label>
            <input type="url" id="imagenUrl" class="form-control" required />
          </div>
          <div class="col-12">
            <button class="btn btn-primary" type="submit">Guardar récord</button>
          </div>
        </form>
      </section>
    </main>

    <footer class="bg-dark text-white text-center py-3">
      <p class="mb-0"></p>
    </footer>

    <script src="./js/app.js"></script>
  </body>
</html>
